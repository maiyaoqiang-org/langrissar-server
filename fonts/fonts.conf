<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir>/usr/share/fonts</dir>

  <!-- 默认 sans-serif 字体回退链：CJK优先，Emoji最后 -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK KR</family>
      <family>WenQuanYi Zen Hei</family>
      <family>FreeSans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- 默认 serif 字体回退链 -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>WenQuanYi Zen Hei</family>
      <family>FreeSerif</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- 默认 monospace 字体回退链 -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Sans Mono CJK TC</family>
      <family>WenQuanYi Zen Hei</family>
      <family>FreeMono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- 强制限制 Noto Color Emoji 只渲染特定范围（emoji字符） -->
  <match target="font">
    <test name="family" compare="eq">
      <string>Noto Color Emoji</string>
    </test>
    <edit name="charset" mode="assign">
      <charset>
        <range>
          <int>0x1F600</int>
          <int>0x1F64F</int>
        </range>
        <range>
          <int>0x1F300</int>
          <int>0x1F5FF</int>
        </range>
        <range>
          <int>0x1F680</int>
          <int>0x1F6FF</int>
        </range>
        <range>
          <int>0x1F900</int>
          <int>0x1F9FF</int>
        </range>
        <range>
          <int>0x1FA00</int>
          <int>0x1FA6F</int>
        </range>
        <range>
          <int>0x1FA70</int>
          <int>0x1FAFF</int>
        </range>
        <range>
          <int>0x2600</int>
          <int>0x26FF</int>
        </range>
        <range>
          <int>0x2700</int>
          <int>0x27BF</int>
        </range>
        <range>
          <int>0xFE00</int>
          <int>0xFE0F</int>
        </range>
        <range>
          <int>0x200D</int>
          <int>0x200D</int>
        </range>
        <range>
          <int>0x20E3</int>
          <int>0x20E3</int>
        </range>
        <range>
          <int>0xE0020</int>
          <int>0xE007F</int>
        </range>
      </charset>
    </edit>
  </match>
</fontconfig>
